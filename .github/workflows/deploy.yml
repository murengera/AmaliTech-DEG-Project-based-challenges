name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - 'dev-ops/DeployReady/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: murengera/amalitech-deg-project-based-challenges

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: dev-ops/DeployReady/app/package-lock.json

      - name: Install dependencies and Run tests
        run: |
          cd dev-ops/DeployReady/app
          npm ci
          npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: dev-ops/DeployReady/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # GITHUB_TOKEN is passed as an env var to avoid leaking it in the script string.
          # The ${{ env.REGISTRY }} and ${{ env.IMAGE_NAME }} refs below are expanded by
          # GitHub Actions on the runner BEFORE the script is sent to EC2 — they are NOT
          # environment variables on the remote host.
          envs: GITHUB_TOKEN
          script: |
            # Log in to registry on the EC2 (token is injected via envs, not interpolated)
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

            # Stop existing container
            docker stop kora-api || true
            docker rm kora-api || true

            # Run on Port 80
            docker run -d \
              --name kora-api \
              -p 80:3000 \
              -e PORT=3000 \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}