name: Deploy API

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    # Part 2 requirement: Run npm test. If tests fail, the pipeline stops.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: dev-ops/DeployReady/app/package-lock.json

      # Install dependencies and run tests in the 'app' directory
      - name: Install dependencies and Run tests
        run: |
          cd dev-ops/DeployReady/app
          npm ci
          npm test

  build-and-push:
    # Part 2 requirement: Build the Docker image and tag it with the Git commit SHA.
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the automatic GITHUB_TOKEN
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Create unique tags based on the Git commit SHA for traceability
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long

      # Build the image and push to the registry
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: dev-ops/DeployReady/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    # Part 2 requirement: Pull the new image on the EC2 server and restart the container.
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Use SSH to connect to the AWS instance and execute deployment commands
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Authenticate the server with the container registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the specific version of the image we just built
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            
            # Clean up existing container to avoid port conflicts
            docker stop kora-api || true
            docker rm kora-api || true
            
            # Part 3 requirement: Run container mapping host port 80 to container port 3000
            docker run -d \
              --name kora-api \
              -p 80:3000 \
              -e PORT=3000 \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
