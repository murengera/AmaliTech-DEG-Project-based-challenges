services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kora-analytics-api:latest
    container_name: kora-api
    ports:
      - "3000:${PORT}"
    env_file:
      - .env
    environment:
      - PORT=${PORT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
